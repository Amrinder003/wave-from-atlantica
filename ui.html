<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Wave from Atlantica</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0f7f9; --sf:#ffffff; --sf2:#f8fafc;
  --bd:#e2e8f0; --bd2:#cbd5e1;      
  --ink:#0f172a; --ink2:#334155; --ink3:#64748b;     
  --A:#0284c7; --A2:#0369a1; --Ap:#e0f2fe; 
  --G:#059669; --R:#e11d48; --Y:#d97706; 
  --nh:64px; --sh:48px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font:inherit;border:none;background:none;}
input,textarea,select{font:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}

/* UTILS */
.page{display:none;} .page.on{display:block;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:12px;font-size:14px;font-weight:700;transition:.12s;cursor:pointer;white-space:nowrap;}
.btn-A{background:var(--A);color:#fff;}.btn-A:hover{background:var(--A2);}
.btn-o{background:var(--sf);border:1px solid var(--bd);color:var(--ink2)}.btn-o:hover{background:var(--sf2);border-color:var(--bd2)}
.btn-g{background:transparent;color:var(--ink3)}.btn-g:hover{background:var(--sf2);color:var(--ink2)}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:10px;}
.empty{text-align:center;padding:40px 20px;color:var(--ink3);background:var(--sf);border-radius:16px;border:1px solid var(--bd)}
.empty-i{font-size:32px;margin-bottom:8px;}
.stxt{font-size:13px;color:var(--ink3);min-height:18px;}
.stxt.ok{color:var(--G)}.stxt.err{color:var(--R)}
.badge{padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;background:var(--Ap);color:var(--A)}

/* NAV */
.nav{position:sticky;top:0;z-index:100;height:var(--nh);background:var(--sf);display:flex;align-items:center;padding:0 16px;gap:10px; border-bottom:1px solid var(--bd);}
.nav-logo{cursor:pointer; font-family:'Sora';font-weight:800;font-size:18px;}
.nav-logo em{color:var(--A); font-style:normal;}
.nav-right{margin-left:auto; display:flex; gap:6px; align-items:center;}
@media(max-width:600px){.nav-lbl{display:none}}

/* SUBNAV (Categories) */
.subnav{background:var(--sf);display:flex;gap:4px;padding:8px 16px;border-bottom:1px solid var(--bd);overflow-x:auto;}
.snav{padding:6px 13px;border-radius:99px;font-size:13px;white-space:nowrap;}
.snav.on{background:var(--A);color:#fff;font-weight:600;}

/* PRODUCT GRID & CARDS */
.main-wrap{max-width:1320px;margin:0 auto;padding:24px 16px 70px;}
@media(max-width:680px){.main-wrap{padding:16px 10px 70px;}}
.sec-head{margin-bottom:16px;}
.sec-tit{font-family:'Sora';font-size:20px;font-weight:800;letter-spacing:-.2px;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
@media(max-width:450px){.pgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px;}}

.pc{background:var(--sf);border:1px solid var(--bd);border-radius:16px;overflow:hidden;transition:.15s;position:relative;display:flex;flex-direction:column;box-shadow:0 2px 4px rgba(0,0,0,.03);}
.pc:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.06);border-color:var(--bd2);}
.pc-photo-wrap{width:100%;aspect-ratio:4/3;background:var(--sf2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.pc-img{width:100%;height:100%;object-fit:cover;}
.pc-nophoto{font-size:40px;color:var(--bd2);}
.pc-fav{position:absolute;top:8px;left:8px;width:28px;height:28px;border-radius:99px;background:#fff;display:grid;place-items:center;font-size:14px;color:var(--ink3);box-shadow:0 2px 5px rgba(0,0,0,.15);cursor:pointer;}
.pc-fav.on{color:var(--R)}
.pc-body{padding:12px;flex:1;display:flex;flex-direction:column;}
.pc-n{font-weight:600;font-size:13px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;cursor:pointer;}
.pc-n:hover{color:var(--A);}
.pc-price{font-family:'Sora';font-size:16px;font-weight:800;color:var(--A);margin-top:auto;padding-top:4px;}
.pc-stock{font-size:11px;font-weight:600;margin-top:2px;}
.pc-stock.in{color:var(--G)}.pc-stock.out{color:var(--R)}

/* ADMIN MASTER-DETAIL */
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.a-sc{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:18px;cursor:pointer;transition:.15s;}
.a-sc:hover{border-color:var(--A);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.05);}
.a-sc-n{font-family:'Sora';font-weight:700;font-size:16px;}
.a-sc-m{font-size:13px;color:var(--ink3);margin-top:2px;}

.dash-hdr{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:16px;}
.dash-n{font-family:'Sora';font-weight:800;font-size:22px;}
.dash-tabs{display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--bd);margin-top:12px;}
.dash-tab{padding:8px 16px;font-size:14px;font-weight:600;color:var(--ink3);border-radius:10px 10px 0 0;white-space:nowrap;}
.dash-tab.on{color:var(--A);background:var(--Ap);border:1px solid var(--bd);border-bottom-color:transparent;}

.dash-panel{display:none;background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:20px; animation:popIn .2s;}
.dash-panel.on{display:block;}

.a-peditor{display:none;background:var(--Ap);padding:16px;border-radius:12px;margin-bottom:16px;border:1px solid var(--bd);}
.a-peditor.on{display:block;}

/* FORM ELEMENTS */
.fstack{display:grid;gap:12px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.fg2{grid-template-columns:1fr;}}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.fld input:not([type=file]),.fld textarea,.fld select{width:100%;padding:10px 14px;border:1px solid var(--bd);border-radius:10px;font-size:14px;}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:var(--A);outline:none;}
.fld input[type=file]{font-size:13px;color:var(--ink3);padding:6px;cursor:pointer;}

/* UTILS */
@keyframes popIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.badge.on{color:var(--R); background:var(--Rp);}
.toast{position:fixed;bottom:20px;right:20px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px 20px;color:var(--ink2);box-shadow:0 8px 30px rgba(0,0,0,.12);font-size:14px;font-weight:600;z-index:1000;}
</style>
</head>
<body>

<header class="nav">
  <div class="nav-logo" onclick="goHome()">🌊 Wave</div>
  <div class="nav-right">
    <button class="btn btn-o btn-sm" id="authBtn">Sign In</button>
    <button class="btn btn-A btn-sm" onclick="showPage('admin')" id="adminNavBtn" style="display:none">
       🔧 <span class="nav-lbl">Dashboard</span>
    </button>
  </div>
</header>

<div class="subnav" id="catNav">
  <button class="snav on" data-cat="">All</button>
  <button class="snav" data-cat="Food">Food</button>
  <button class="snav" data-cat="Electronics">Electronics</button>
  <button class="snav" data-cat="Other">Other</button>
</div>

<div id="pg-home" class="page main-wrap on">
  <div class="sec-head"><div class="sec-tit">All Products</div></div>
  <div id="homeGrid" class="pgrid">
    <div class="empty"><div class="empty-i">⌛</div><div>Loading products...</div></div>
  </div>
</div>

<div id="pg-admin" class="page main-wrap">
  <div id="admin-shops" class="fstack">
    <div class="sec-head" style="display:flex; justify-content:space-between; align-items:center">
        <div class="sec-tit">My Shops</div>
        <button id="btnNewShop" class="btn btn-A btn-sm">+ Create Shop</button>
    </div>
    
    <div id="newShopEditor" style="display:none; background:var(--sf); padding:16px; border-radius:16px; border:1px solid var(--bd);">
        <div class="fg2">
            <div class="fld"><label>Shop Name</label><input id="newShopN"/></div>
            <div class="fld"><label>Address</label><input id="newShopA"/></div>
        </div>
        <div class="btn-row" style="margin-top:12px">
            <button class="btn btn-A btn-sm" id="submitNewShop">Create</button>
            <button class="btn btn-g btn-sm" onclick="$('newShopEditor').style.display='none'">Cancel</button>
        </div>
        <div id="newShopStatus" class="stxt" style="margin-top:8px"></div>
    </div>

    <div id="myShopsGrid" class="admin-grid"></div>
  </div>

  <div id="admin-dash" style="display:none">
    <button class="btn btn-g btn-sm" onclick="showShopsList()" style="padding-left:0; margin-bottom:12px">← Back to My Shops</button>
    <div class="dash-hdr">
        <div class="dash-n" id="dashShopName">Shop Dashboard</div>
        <div class="dash-tabs">
            <button class="dash-tab on" data-tab="prods">Products</button>
            <button class="dash-tab" data-tab="info">Settings</button>
            <button class="dash-tab" data-tab="an">Analytics</button>
        </div>
    </div>

    <div id="tab-prods" class="dash-panel on">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div style="font-weight:700">Inventory <span id="dashPBadge" class="badge">0</span></div>
            <button class="btn btn-A btn-sm" id="btnNewProd">+ Add Product</button>
        </div>

        <div id="prodEditor" class="a-peditor fstack">
            <div style="font-weight:700; color:var(--A)" id="peTit">Add Product</div>
            <div class="fg2">
                <div class="fld"><label>Name</label><input id="pName"/></div>
                <div class="fld"><label>Price (Optional)</label><input id="pPrice" placeholder="$10.00"/></div>
            </div>
            <div class="fld"><label>About Product</label><textarea id="pOverview" rows="3"></textarea></div>
            <div class="fg2">
                <div class="fld"><label>Stock Status</label>
                    <select id="pStock"><option value="in">In Stock</option><option value="out">Out of Stock</option></select>
                </div>
                <div class="fld"><label>Images (Select to upload)</label><input id="pFiles" type="file" multiple/></div>
            </div>
            <div class="btn-row" style="margin-top:8px">
                <button class="btn btn-A btn-sm" id="saveProdBtn">Save</button>
                <button class="btn btn-g btn-sm" id="cancelProdBtn">Cancel</button>
                <div id="prodStatus" class="stxt"></div>
            </div>
        </div>

        <div id="dashPGrid" class="pgrid"></div>
    </div>

    <div id="tab-info" class="dash-panel fstack">
        <div style="font-weight:700;margin-bottom:10px">Shop Settings</div>
        <div class="fg2">
            <div class="fld"><label>Name</label><input id="sNameIn"/></div>
            <div class="fld"><label>Address</label><input id="sAddrIn"/></div>
        </div>
        <div class="btn-row">
            <button class="btn btn-A btn-sm" id="saveShopBtn">Save Settings</button>
            <div id="shopStatus" class="stxt"></div>
        </div>
    </div>
    
    <div id="tab-an" class="dash-panel">
        <div style="font-weight:700">Coming Soon</div>
    </div>
  </div>
</div>

<div id="pg-login" class="page main-wrap">
    <div class="dash-hdr" style="max-width:400px; margin: 40px auto; display:flex; flex-direction:column; gap:12px;">
        <div class="dash-n">Sign In</div>
        <div class="fld"><label>Email</label><input id="le"/></div>
        <div class="fld"><label>Password</label><input id="lp" type="password"/></div>
        <button class="btn btn-A" id="lsub" style="justify-content:center">Login</button>
        <div id="lstatus" class="stxt"></div>
    </div>
</div>

<script>
/* CORE UTILS */
const App = { srv: '', shops: [], user: null, activeSid: null, curShopProds: [] };
const $=id=>document.getElementById(id);
const abs=(p)=> p?.startsWith('http')?p:`${App.srv.replace(/\/$/,'')}/${p.replace(/^\//,'')}`;
const setS=(id,m,t='')=>{ $(id).textContent=m; $(id).className=`stxt ${t}`; }
function toast(m){const el=document.createElement('div');el.className='toast';el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),3000);}

async function api(path,opt={}){
  const h={...(opt.headers||{})}; if(App.user) h['Authorization']=`Bearer ${App.user.token}`;
  try{
    const r=await fetch(`${App.srv}${path}`,{...opt,headers:h});
    if(!r.ok){const d=await r.json().catch(()=>{}); throw new Error(d?.detail||`Error ${r.status}`);}
    return r.json();
  }catch(e){ throw e; }
}

function showPage(p){
    document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
    $(`pg-${p}`).classList.add('on');
    if(p==='home') loadHomeProducts();
    if(p==='admin') renderMyShopsList();
}
function goHome(){ showPage('home'); }

/* PRODUCT CARD BUILDER (FIXES IMAGES) */
function makeCard(p, mode='public'){
    const card=document.createElement('div'); card.className='pc';
    const hasImgs=p.images && p.images.length > 0;
    
    //MODE SPECIFIC BUTTONS
    let btns=`<div class="pc-price">${esc(p.price||'$0.00')}</div>`;
    if(mode==='admin'){
        btns=`<button class="btn btn-o btn-sm btn-edit" style="width:100%; justify-content:center; margin-top:10px;">Edit</button>`;
    }

    card.innerHTML=`
        <div class="pc-photo-wrap">
            ${hasImgs ? `<img src="${esc(abs(p.images[0]))}" class="pc-img" loading="lazy"/>` : `<div class="pc-nophoto">📦</div>`}
            <div class="pc-fav">🤍</div>
        </div>
        <div class="pc-body">
            <div class="pc-n">${esc(p.name)}</div>
            <div class="pc-stock ${p.stock==='in'?'in':'out'}">${p.stock==='in'?'In Stock':'Out'}</div>
            ${btns}
        </div>
    `;
    
    if(mode==='admin'){
        card.querySelector('.btn-edit').addEventListener('click', () => openProdEditor(p));
    } else {
        card.querySelector('.pc-fav').addEventListener('click',()=>toast('Coming soon'));
    }
    return card;
}
const esc=(s)=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* PUBLIC / HOME */
async function loadHomeProducts(cat=''){
    const g=$('homeGrid');
    try{
        g.innerHTML='<div class="empty"><div class="empty-i">⌛</div><div>Loading products...</div></div>';
        const d=await api(`/public/top-products`); // Simplified cat/limit for prototyping
        g.innerHTML='';
        const prods = d.products || [];
        if(!prods.length){ g.innerHTML='<div class="empty">No products found.</div>'; return; }
        prods.forEach(p=>g.appendChild(makeCard(p)));
    }catch(e){ g.innerHTML=`<div class="empty err">${e.message}</div>`; }
}
$('catNav').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    $('catNav').querySelectorAll('button').forEach(el=>el.classList.remove('on')); b.classList.add('on');
    loadHomeProducts(b.dataset.cat);
}));

/* AUTH */
$('authBtn').addEventListener('click',()=>App.user?logoutUI():showPage('login'));
function logoutUI(){ App.user=null; toast('Signed out'); $('adminNavBtn').style.display='none'; $('authBtn').textContent='Sign In'; goHome(); }
$('lsub').addEventListener('click',async()=>{
    const email=$('le').value,password=$('lp').value;
    try{
        setS('lstatus','Connecting...');
        const d=await api('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
        App.user = {token:d.token, email:d.email, name:d.display_name};
        toast('Logged in ✓'); $('authBtn').textContent='Sign Out'; $('adminNavBtn').style.display='inline-flex';
        showPage('home');
    }catch(e){setS('lstatus',e.message,'err')}
});

/* ADMIN SHOPS LIST */
async function renderMyShopsList(){
    $('admin-dash').style.display='none'; $('admin-shops').style.display='flex';
    const g=$('myShopsGrid'); g.innerHTML='⌛';
    try{
        const d=await api('/admin/my-shops');
        g.innerHTML='';
        if(!d.shops?.length){ g.innerHTML='<div class="empty">Create your first shop!</div>'; return; }
        d.shops.forEach(s=>{
            const card=document.createElement('div'); card.className='a-sc';
            card.innerHTML=`<div class="a-sc-n">${esc(s.name)}</div><div class="a-sc-m">${esc(s.address)}</div><div class="badge" style="margin-top:6px">${s.stats?.product_count||0} Prods</div>`;
            card.addEventListener('click',()=>openDash(s.shop_id, s.name));
            g.appendChild(card);
        });
    }catch(e){g.innerHTML=e.message;}
}
$('btnNewShop').addEventListener('click',()=>{$('newShopEditor').style.display='block';setS('newShopStatus','');});
$('submitNewShop').addEventListener('click',async()=>{
    const name=$('newShopN').value,address=$('newShopA').value;
    try{
        setS('newShopStatus','Creating...');
        const d=await api('/admin/create-shop',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({shop:{name,address}})});
        toast('Shop created ✓'); $('newShopEditor').style.display='none'; openDash(d.shop_id, name);
    }catch(e){setS('newShopStatus',e.message,'err')}
});

/* ADMIN DASHBOARD */
async function openDash(sid,sname){
    App.activeSid=sid; $('dashShopName').textContent=sname;
    $('admin-shops').style.display='none'; $('admin-dash').style.display='block';
    //Fill settings tab
    $('sNameIn').value=sname; $('sAddrIn').value='';
    switchDashTab('prods');
}
function showShopsList(){ renderMyShopsList(); }
function switchDashTab(t){
    document.querySelectorAll('.dash-tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
    document.querySelectorAll('.dash-panel').forEach(p=>p.classList.toggle('on',p.id===`tab-${t}`));
    if(t==='prods') loadDashProds();
}
document.querySelectorAll('.dash-tab').forEach(b=>b.addEventListener('click',()=>switchDashTab(b.dataset.tab)));

async function loadDashProds(){
    const g=$('dashPGrid'); g.innerHTML='⌛';
    try{
        const d=await api(`/admin/shop/${App.activeSid}`);
        $('sAddrIn').value=d.data.shop?.address||'';
        const prods=d.data.products||[];
        $('dashPBadge').textContent=prods.length; g.innerHTML='';
        if(!prods.length){g.innerHTML='<div class="empty">Add product!</div>'; return;}
        prods.forEach(p=>g.appendChild(makeCard(p,'admin')));
    }catch(e){g.innerHTML=e.message;}
}

/* ADMIN PRODUCT EDITOR */
let currentEditingPid = null;
$('btnNewProd').addEventListener('click',()=>openProdEditor());
function openProdEditor(p=null){
    const ed=$('prodEditor'); ed.classList.add('on');
    currentEditingPid = p?.product_id;
    $('peTit').textContent=p?`Edit Product`:`Add Product`;
    $('pName').value=p?.name||''; $('pPrice').value=p?.price||'';
    $('pOverview').value=p?.overview||''; $('pStock').value=p?.stock||'in';
    $('pFiles').value=''; setS('prodStatus','');
    ed.scrollIntoView({behavior:'smooth'});
}
$('cancelProdBtn').addEventListener('click',()=>$('prodEditor').classList.remove('on'));

$('saveProdBtn').addEventListener('click',async()=>{
    const name=$('pName').value, price=$('pPrice').value, overview=$('pOverview').value;
    const stock=$('pStock').value, files=$('pFiles').files;
    if(!name)return setS('prodStatus','Name required','err');
    
    //Use existing pid if editing, or generate a simple new one
    const pid = currentEditingPid || `p${Date.now()}`;
    
    const formData = new FormData();
    formData.append('product_id', pid); formData.append('name', name);
    formData.append('price', price); formData.append('overview', overview); formData.append('stock', stock);
    for(let f of files) formData.append('images',f);
    
    try{
        setS('prodStatus','Saving...');
        //Backend uses /product-with-images for both new and edit (upsert)
        await api(`/admin/shop/${App.activeSid}/product-with-images`,{method:'POST',body:formData});
        toast('Saved ✓'); $('prodEditor').classList.remove('on'); loadDashProds();
    }catch(e){setS('prodStatus',e.message,'err')}
});

/* SETTINGS */
$('saveShopBtn').addEventListener('click',async()=>{
    const name=$('sNameIn').value, address=$('sAddrIn').value;
    try{
        setS('shopStatus','Saving...');
        await api(`/admin/shop/${App.activeSid}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,address})});
        toast('Saved ✓'); $('dashShopName').textContent=name; setS('shopStatus','Saved','ok');
    }catch(e){setS('shopStatus',e.message,'err')}
});

/* BOOT */
(async function init(){ loadHomeProducts(); })();
</script>
</body>
</html>
